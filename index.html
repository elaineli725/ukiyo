<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>浮世绘图录 Ukiyo-e Atlas</title>
    <meta name="description" content="浮世绘主题前端 demo：数字展览、图像文献与专题阅读。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html" id="site-name"></a>
      <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="site-nav">目录</button>
      <nav class="site-nav" id="site-nav" aria-label="主导航"></nav>
    </header>

    <main>
      <section class="panel ia" aria-labelledby="ia-title">
        <p class="kicker">第一阶段 · 步骤 1</p>
        <h2 id="ia-title">信息架构</h2>
        <div class="card-grid" id="ia-grid"></div>
      </section>

      <section class="panel hero" aria-labelledby="hero-title">
        <p class="kicker" id="hero-kicker"></p>
        <h1 id="hero-title"></h1>
        <p class="lead" id="hero-description"></p>
        <div class="actions" id="hero-actions"></div>
      </section>

      <section class="panel" aria-labelledby="about-title">
        <h2 id="about-title"></h2>
        <div id="about-content" class="stack"></div>
      </section>

      <section class="panel" aria-labelledby="genres-title">
        <h2 id="genres-title">题材分类</h2>
        <div class="genre-grid" id="genre-grid"></div>
      </section>

      <section class="panel" aria-labelledby="artists-title">
        <h2 id="artists-title">代表画师</h2>
        <div class="card-grid" id="artist-grid"></div>
      </section>

      <section class="panel" aria-labelledby="works-title">
        <h2 id="works-title">精选作品</h2>
        <div class="card-grid" id="work-grid"></div>
      </section>

      <section class="panel" aria-labelledby="curation-title">
        <h2 id="curation-title">专题策展</h2>
        <div class="card-grid" id="curation-grid"></div>
      </section>

      <section class="panel" aria-labelledby="templates-title">
        <p class="kicker">第一阶段 · 步骤 4</p>
        <h2 id="templates-title">页面模板入口</h2>
        <div class="template-links">
          <a href="overview.html">概览页模板</a>
          <a href="artist.html">画师页模板</a>
          <a href="artwork.html">作品详情页模板</a>
          <a href="topic.html">专题页模板</a>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="footer"></footer>
    <script type="module" src="main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating World · 江户绮梦</title>
    <meta name="description" content="Floating World / 江户绮梦：浮世绘主题的数字展览式前端 demo。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html"><span id="site-name"></span><small id="site-zh-name"></small></a>
      <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="site-nav">目录</button>
      <nav class="site-nav" id="site-nav" aria-label="主导航"></nav>
    </header>

    <main>
      <section class="panel hero-panel" id="hero-panel" aria-labelledby="hero-title">
        <h1 id="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>
        <a class="button button-primary" id="hero-action" href="#"></a>
        <p class="hero-credit" id="hero-credit"></p>
      </section>

      <section class="panel" id="painted-world" aria-labelledby="portal-title">
        <h2 id="portal-title"></h2>
        <div class="card-grid" id="portal-grid"></div>
      </section>

      <section class="panel" aria-labelledby="featured-title">
        <h2 id="featured-title"></h2>
        <p class="kicker" id="featured-subtitle"></p>
        <div class="image-grid" id="featured-grid"></div>
      </section>

      <section class="panel preface" aria-labelledby="preface-title">
        <h2 id="preface-title">前言</h2>
        <div id="preface-content"></div>
      </section>
    </main>

    <footer class="site-footer" id="footer"></footer>
    <script type="module" src="main.js"></script>
  </body>
</html>
